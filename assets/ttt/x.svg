<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="3" y="3" width="94" height="94" rx="16" fill="#161b22" stroke="#bc8cff" stroke-width="2"/>
  <g stroke="#d2a8ff" stroke-width="10" stroke-linecap="round" filter="url(#glow)">
    <line x1="30" y1="30" x2="70" y2="70">
      <animate attributeName="stroke-opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="70" y1="30" x2="30" y2="70">
      <animate attributeName="stroke-opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>
