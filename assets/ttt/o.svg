<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="3" y="3" width="94" height="94" rx="16" fill="#161b22" stroke="#56d4dd" stroke-width="2"/>
  <circle cx="50" cy="50" r="24" fill="none" stroke="#79c0ff" stroke-width="10" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
