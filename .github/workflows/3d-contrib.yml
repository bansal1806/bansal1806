name: generate 3d contribution skyline

on:
  schedule:
    - cron: "0 18 * * *" # daily
  workflow_dispatch:
  push:
    branches: [main]
    paths: [".github/workflows/3d-contrib.yml"]

permissions:
  contents: write

concurrency:
  group: readme-updates
  cancel-in-progress: false

jobs:
  skyline:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3d contribution SVGs
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit skyline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib
          git diff --cached --quiet || git commit -m "🏙️ update 3d contribution skyline"
          git pull --rebase origin main
          git push origin main
