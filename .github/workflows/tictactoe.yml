name: tic-tac-toe move

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: readme-updates
  cancel-in-progress: false

jobs:
  move:
    if: startsWith(github.event.issue.title, 'ttt|')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Play the move
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
        run: node scripts/tictactoe.js

      - name: Commit updated board
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Readme.md game/board.json
          git diff --cached --quiet || git commit -m "🎮 ttt: move by @${{ github.event.issue.user.login }}"
          git pull --rebase origin main
          git push origin main

      - name: Reply and close the issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body-file game/comment.txt
          gh issue close ${{ github.event.issue.number }} --repo ${{ github.repository }}
